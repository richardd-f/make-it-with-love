# Self-contained monitoring + load-benchmark rig.
#
# Separate from the app's prod docker-compose.yml so production is never forced
# to run any of this. Brings up the whole world on a private `bench` network:
#   db -> migrate -> seed -> web  (the app under test, built from ../Dockerfile)
#   cadvisor -> prometheus -> grafana  (the observability stack)
#   k6  (on-demand only, via the `bench` profile — never auto-starts)
#
# All ports bind to 127.0.0.1 — access Grafana/Prometheus/cAdvisor from your
# local machine via SSH tunnel:
#   ssh -L 3000:localhost:3000 -L 3001:localhost:3001 \
#       -L 9090:localhost:9090 -L 8080:localhost:8080 user@vps
#
# Resource limits mirror the Laravel benchmark rig so comparisons are fair.
# k6 is capped at 10 VUs regardless of target RPS; without this cap k6 has
# previously frozen the server.

x-app-env: &app-env
  DATABASE_URL: postgresql://bench:bench@db:5432/benchdb
  AUTH_SECRET: bench-only-secret-not-for-production
  AUTH_TRUST_HOST: "true"
  NEXT_TELEMETRY_DISABLED: "1"

x-app: &app
  image: miwl-bench:latest
  build:
    context: ..
    dockerfile: Dockerfile
    # Forward the NEXT_PUBLIC_* build-time args the Dockerfile expects.
    # Values can be empty for a bench-only build — Cloudinary/upload features
    # are not exercised by any benchmark phase.
    args:
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_UPLOAD_PRESET: ${CLOUDINARY_UPLOAD_PRESET:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
  networks: [bench]
  depends_on:
    db:
      condition: service_healthy

services:
  # ---------------------------------------------------------------- app + db
  db:
    image: postgres:16-alpine
    container_name: miwl-bench-db
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: benchdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d benchdb"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [bench]

  migrate:
    <<: *app
    container_name: miwl-bench-migrate
    environment: *app-env
    command: ["prisma", "migrate", "deploy"]
    restart: "no"

  seed:
    <<: *app
    container_name: miwl-bench-seed
    environment: *app-env
    command: ["sh", "-c", "prisma generate && tsx prisma/seed.ts && tsx prisma/seed.bench.ts"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  web:
    <<: *app
    container_name: miwl-bench-web
    environment:
      <<: *app-env
      ENABLE_BENCHMARK_API: "1"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    # 0.90 cores matches the prod compose budget; keeps CPU results reproducible.
    deploy:
      resources:
        limits:
          cpus: "0.90"
    restart: unless-stopped

  # ------------------------------------------------------------ observability
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: miwl-bench-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks: [bench]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: miwl-bench-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - cadvisor
    networks: [bench]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 256M

  grafana:
    image: grafana/grafana:11.2.0
    container_name: miwl-bench-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks: [bench]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  # ------------------------------------------------------------ load generator
  # On-demand only: the `bench` profile keeps it out of `up`. Launched by
  # run-phase.sh / run-phase.ps1, e.g.:
  #   docker compose -f monitoring/docker-compose.monitoring.yml \
  #     run --rm -e MODE=rps -e RPS=10 -e DURATION=30s k6 run /scripts/light.js
  #
  # Hard-capped at 10 VUs (enforced in k6/lib/options.js) to prevent k6 from
  # starving the app and freezing the VPS.
  k6:
    image: grafana/k6:0.53.0
    container_name: miwl-bench-k6
    profiles: ["bench"]
    user: "0"
    environment:
      BASE_URL: http://web:3000
      BENCH_EMAIL: bench@makeitwithlove.com
      BENCH_PASSWORD: Bench@12345
    volumes:
      - ./k6:/scripts:ro
      - ./results:/results
    networks: [bench]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  bench:
    name: miwl-bench
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
